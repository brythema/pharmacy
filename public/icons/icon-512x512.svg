<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad512" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#111827" />
    </radialGradient>
    <filter id="glow512" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded Background with extra bleed-safety margin for maskable -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad512)" />
  <!-- Medical/AI Cross emblem with custom glow -->
  <path d="M256 120 v272 M120 256 h272" stroke="#ffffff" stroke-width="58" stroke-linecap="round" filter="url(#glow512)"/>
  <!-- Elegant Sparkle/AI dots -->
  <circle cx="370" cy="140" r="22" fill="#38bdf8" />
  <circle cx="140" cy="370" r="16" fill="#7dd3fc" />
  <!-- Heartbeat path inside -->
  <path d="M190 256 h28 l18 -40 l18 80 l18 -60 l18 20 h32" stroke="#bae6fd" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
