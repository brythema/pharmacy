<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1e40af" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded Background -->
  <rect width="192" height="192" rx="42" fill="url(#bgGrad)" />
  <!-- Medical/AI Cross emblem with custom glow -->
  <path d="M96 48 v96 M48 96 h96" stroke="#ffffff" stroke-width="24" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Elegant Sparkle/AI dots -->
  <circle cx="135" cy="55" r="8" fill="#60a5fa" />
  <circle cx="55" cy="135" r="6" fill="#93c5fd" />
  <!-- Heartbeat path inside -->
  <path d="M72 96 h10 l6 -15 l6 30 l6 -22 l6 7 h14" stroke="#bfdbfe" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
